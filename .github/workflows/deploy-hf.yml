name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  HF_USERNAME: Keshav022   # ← edit
  HF_SPACE: kensho                # ← edit (the Space name)

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN repo secret is not set."; exit 1
          fi
          # Write the HF Space config (frontmatter) as README.md before pushing, so the
          # Space is configured and the GitHub project README is never touched.
          printf '%s\n' \
            '---' \
            'title: Kensho' \
            'emoji: 🍜' \
            'colorFrom: yellow' \
            'colorTo: red' \
            'sdk: docker' \
            'app_port: 7860' \
            'pinned: false' \
            '---' \
            '' \
            '# Kensho — AI atlas for taste. FastAPI + React in one Docker image.' > README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f README.md
          git commit -m "ci: sync to Hugging Face Space" || echo "nothing to commit"
          git push --force \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}" \
            HEAD:main
